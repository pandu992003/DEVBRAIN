version: "3.9"

services:
  api:
    build: .
    container_name: devbrain-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./devbrain.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./devbrain.db:/app/devbrain.db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
